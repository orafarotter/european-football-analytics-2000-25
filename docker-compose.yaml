# ---------------------------------------------------------------------------
# Docker Compose — Airflow 2.10.5 with LocalExecutor
#
# Services:
#   postgres        — Airflow metadata database
#   airflow-init    — one-shot container: db migrate + create admin user
#   airflow-webserver
#   airflow-scheduler
#
# Volumes:
#   ./dags          — DAGs and scripts (bind-mount, no rebuild needed)
#   ./football_dbt  — dbt project (bind-mount)
#   ./credentials   — GCP service-account key (bind-mount, never committed)
#   ./logs          — Airflow task logs
#
# Ports:
#   8080 → Airflow UI
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: eu-football-airflow:latest
  env_file:
    - .env
  environment:
    # --- Core ---
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    # --- Database ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

    # --- Webserver ---
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    # --- Logging ---
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO

    # IMPORTANT: leave this empty so Airflow does NOT reinstall packages
    # on every container start (we bake them into the image instead).
    _PIP_ADDITIONAL_REQUIREMENTS: ""

    # --- GCP credentials ---
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/pipeline-sa-key.json

    # --- dbt ---
    DBT_PROJECT_DIR: /opt/airflow/football_dbt

    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}

  volumes:
    - ./dags:/opt/airflow/dags
    - ./football_dbt:/opt/airflow/football_dbt
    - ./credentials:/opt/airflow/credentials:ro
    - airflow-logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

  restart: unless-stopped

# ---------------------------------------------------------------------------
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # One-shot service: runs `airflow db migrate` and creates the admin user,
  # then exits. Compose won't start the other services until this completes.
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email ${AIRFLOW_ADMIN_EMAIL} || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

# ---------------------------------------------------------------------------
volumes:
  postgres-db:
  airflow-logs: