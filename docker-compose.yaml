# docker-compose.yml — EU Football Analytics pipeline environment.
#
# Services:
#   postgres        : Airflow metadata database
#   airflow-init    : initialises the DB and creates the admin user (runs once)
#   airflow-webserver : Airflow UI (http://localhost:8080)
#   airflow-scheduler : detects and executes DAG tasks (LocalExecutor)
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose up --build
#   3. Open http://localhost:8080 (admin / admin)
#   4. Set Airflow Variables: KAGGLE_USERNAME, KAGGLE_API_TOKEN (via UI or CLI)

x-airflow-common: &airflow-common
  build: .                         # uses the local Dockerfile
  image: eu-football-airflow:latest
  env_file:
    - .env                         # loads GCP_PROJECT_ID, PIPELINE_BUCKET, etc.
  environment:
    # Airflow core configuration
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"

    # Metadata database connection (uses the postgres service below)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow

    # Webserver
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY}"

    # Make dags/scripts importable as a Python package
    PYTHONPATH: /opt/airflow/dags

    # GCP authentication via service account key (generated by Terraform)
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/pipeline-sa-key.json

    # dbt project location inside the container
    DBT_PROJECT_DIR: /opt/airflow/dbt

    # Pipeline configuration (also used by the DAG scripts)
    PIPELINE_PROJECT: "${GCP_PROJECT_ID}"
    PIPELINE_BUCKET: "${PIPELINE_BUCKET}"
    PIPELINE_RAW_DS: "eu_football_raw"

  volumes:
    - ./dags:/opt/airflow/dags                        # DAG file + scripts/
    - ./football_dbt:/opt/airflow/dbt                 # dbt project
    - ./credentials:/opt/airflow/credentials:ro       # SA key (read-only)
    - airflow-logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Metadata database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── One-time initialisation ──────────────────────────────────────────────────
  # Runs `airflow db migrate` and creates the admin user, then exits.
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    restart: "no"   # must not restart after completing successfully

  # ── Webserver ────────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Scheduler ────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres-db:
  airflow-logs: