version: 2

sources:
  - name: eu_football_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: eu_football_raw
    tables:
      - name: raw_matches
        description: "Raw football match data loaded as a BigQuery external table"

models:
  - name: stg_matches
    description: "Staging model for football matches."

    columns:
      - name: match_id
        description: "Unique surrogate key for each match"
        tests:
          - unique
          - not_null

      - name: division
        description: "League division code"
        tests:
          - not_null
          - relationships:
              to: ref('leagues')
              field: code

      - name: match_date
        description: "Date of the match cast from string to DATE"
        tests:
          - not_null

      - name: home_team
        description: "Home team club name"
        tests:
          - not_null

      - name: away_team
        description: "Away team club name"
        tests:
          - not_null

      - name: full_time_result
        description: "Full-time result: H (Home win), D (Draw), A (Away win)"
        tests:
          - accepted_values:
              values: ['H', 'A', 'D']

      - name: league_name
        description: "League name joined from the leagues seed"
        tests:
          - not_null