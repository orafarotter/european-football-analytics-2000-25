# dbt connection profile for the EU Football Analytics project.

# NOTE ON LOCATION: the location is read from the GCP_REGION environment variable so that
# dbt query jobs run in the same region as the BigQuery datasets.

dbt:
  outputs:
    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      dataset: eu_football_mart
      location: "{{ env_var('GCP_REGION') }}" 
      threads: 4
      timeout_seconds: 300
      priority: interactive

  target: prod