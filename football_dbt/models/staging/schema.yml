version: 2

sources:
  - name: eu_football_raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: eu_football_raw
    tables:
      - name: raw_matches
        description: >
          Raw football match data loaded as a BigQuery external table pointing to
          gs://<bucket>/raw/Matches.csv.

models:
  - name: stg_matches
    description: >
      Cleaned and typed staging model for football matches.
      Casts FLOAT64 goal/stats columns to INT64, converts MatchDate to DATE, and joins
      with the leagues seed to enrich division codes with country and league_name.

    columns:
      - name: match_id
        description: "Surrogate key: MD5 of Division + MatchDate + HomeTeam + AwayTeam + FTHome + FTAway"
        tests:
          - unique
          - not_null

      - name: division
        description: "League division code — foreign key to seeds.leagues.code"
        tests:
          - not_null
          # Validates that every division code in the staging model
          # exists in the leagues seed. Uses 'code' because it is the
          # primary key of the seed, not 'league_name' (which is not unique).
          - relationships:
              to: ref('leagues')
              field: code

      - name: match_date
        description: "Date of the match cast from string to DATE"
        tests:
          - not_null

      - name: home_team
        description: "Home team club name"
        tests:
          - not_null

      - name: away_team
        description: "Away team club name"
        tests:
          - not_null

      - name: full_time_result
        description: "Full-time result: H (Home win), D (Draw), A (Away win)"
        tests:
          - accepted_values:
              values: ['H', 'A', 'D']

      - name: league_name
        description: "Human-readable league name joined from the leagues seed"
        tests:
          - not_null