version: 2

sources:
  - name: eu_football_raw
    database: "{{ env_var('DBT_BIGQUERY_PROJECT') }}"
    schema: eu_football_raw
    tables:
      - name: raw_matches
        description: >
          Raw football match data loaded as a BigQuery external table pointing to
          gs://<bucket>/raw/Matches.csv. 

models:
  - name: stg_matches
    description: >
      Cleaned and typed staging model for football matches.
      Casts FLOAT64 goal/stats columns to INT64, converts MatchDate to DATE and joins with the leagues
      seed to enrich division codes with country and league_name.
    columns:
      - name: match_id
        description: "Surrogate key: MD5 of Division + MatchDate + HomeTeam + AwayTeam"
        tests:
          - unique
          - not_null

      - name: division
        description: "League that the match was played in - country code + division number."
        tests:
          - not_null

      - name: match_date
        description: "Date of the match cast from YYYY-MM-DD string to DATE"
        tests:
          - not_null

      - name: home_team
        description: "Home team's club name in English, abbreviated if needed."
        tests:
          - not_null

      - name: away_team
        description: "Away team's club name in English, abbreviated if needed."
        tests:
          - not_null

      - name: full_time_result
        description: "Full-time result (H for Home win, D for Draw and A for Away win)."
        tests:
          - accepted_values:
              values: ['H', 'A', 'D']

      - name: league_name
        description: "Human-readable league name joined from the leagues seed"
        tests:
          - relationships:
              to: ref('leagues')
              field: league_name