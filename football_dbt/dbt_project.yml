name: 'football_dbt'
version: '1.0.0'
config-version: 2

profile: 'football_dbt'

model-paths: ["models"]
seed-paths:  ["seeds"]
macro-paths: ["macros"]
test-paths:  ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# IMPORTANT: the custom schema names below (eu_football_staging, eu_football_mart)
# are used as the final BigQuery dataset names ONLY because the macro
# macros/generate_schema_name.sql overrides dbt's default behaviour.
# Without that macro, dbt would generate names like "<target_schema>_eu_football_staging",
# which would NOT match the datasets created by Terraform.

models:
  football_dbt:
    staging:
      +materialized: view
      +schema: eu_football_staging    # final dataset: eu_football_staging (via generate_schema_name macro)

    mart:
      +materialized: table
      +schema: eu_football_mart       # final dataset: eu_football_mart (via generate_schema_name macro)

seeds:
  football_dbt:
    leagues:
      +schema: eu_football_raw        # seed lands in the raw dataset alongside the external table
      +column_types:
        code:        string
        country:     string
        league_name: string