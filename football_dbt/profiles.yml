# profiles.yml — dbt connection profiles for the EU Football Analytics project.
#
# HOW TO AUTHENTICATE LOCALLY:
# This project uses Application Default Credentials (ADC) via OAuth.
# Before running dbt commands, open your terminal and run:
#
#   gcloud auth application-default login
#
# Set the GCP_PROJECT_ID environment variable in your terminal to your target GCP project:
#   export GCP_PROJECT_ID="your-project-id" (Linux/macOS)
#   set GCP_PROJECT_ID="your-project-id"    (Windows CMD)

football_dbt:
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}" 
      dataset: eu_football_dev          
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive

    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: eu_football_mart      
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive

  target: dev