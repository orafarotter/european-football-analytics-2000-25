# profiles.yml — dbt connection profile for the EU Football Analytics project.
#
# Authentication method: service-account (JSON key)
# This method is required when running dbt inside a Docker container,
# as the oauth method requires an interactive browser session.
#
# The service account JSON key is generated by Terraform and mounted
# into the container via docker-compose.yml.
#
# Environment variables required (set in .env or docker-compose.yml):
#   GCP_PROJECT_ID      : your GCP project ID
#   GOOGLE_APPLICATION_CREDENTIALS : path to the SA key inside the container
#                                    e.g. /opt/airflow/credentials/pipeline-sa-key.json
#
# NOTE ON LOCATION:
# BigQuery datasets were created in 'us-east1' by Terraform, but dbt uses
# the multi-region 'US' here. Both are compatible for reads/writes — dbt's
# location setting controls where query jobs run, not where data is stored.
# Using 'US' avoids issues if any dataset is ever moved to another US region.

football_dbt:
  outputs:

    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      dataset: eu_football_mart                   # dev writes to the same datasets as prod
      location: "{{ env_var('GCP_REGION') }}"     # (project is small; no separate dev environment needed)
      threads: 4
      timeout_seconds: 300
      priority: interactive

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      dataset: eu_football_mart
      location: "{{ env_var('GCP_REGION') }}" 
      threads: 4
      timeout_seconds: 300
      priority: interactive

  target: prod   # always run against prod inside the Airflow container